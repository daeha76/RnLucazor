name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Tailwind CSS
        working-directory: src/Daeha.Lucazor.Demo.Wasm
        run: npm install

      - name: Build Tailwind CSS
        working-directory: src/Daeha.Lucazor.Demo.Wasm
        run: npm run build:css

      - name: Publish WASM app
        run: |
          dotnet publish src/Daeha.Lucazor.Demo.Wasm/Daeha.Lucazor.Demo.Wasm.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Fix base href for GitHub Pages
        run: |
          # Replace <base href="/" /> with <base href="/Lucazor/" />
          sed -i 's|<base href="/" />|<base href="/Lucazor/" />|g' \
            publish/wwwroot/index.html

      - name: Copy index.html as 404.html (SPA fallback)
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
